name: CI/CD Build For BeagleBone Black

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
    # PR Status's
    types: [closed]

# Project list
env:
  # Add more projects with space followed by project name, Ex: p1 p2 p3 ...
  PROJECTS: p1 p2

# Cancel build if new push comes while running
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Lint (clang formatting using v18.1.3)
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install clang-format v18.1.3
        run: pip install clang-format==18.1.3

      - name: Run Lint Check
        run: |
          echo "Checking code formatting..."
          find projects -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror --style=file

  # Job 2: QEMU Integration and Compile Check
  build:
    needs: lint
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm, aarch64, powerpc]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential \
            qemu-system qemu-user-static qemu-utils \
            gdb-multiarch git

          # Install the architecture type we need for run
          if [ "${{ matrix.arch }}" == "arm" ]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf
          elif [ "${{ matrix.arch }}" == "aarch64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          elif [ "${{ matrix.arch }}" == "powerpc" ]; then
            sudo apt-get install -y gcc-powerpc-linux-gnu
          fi

      - name: Verify Toolchain Versions
        run: |
          echo "-- QEMU & Cross-Compile Check --"

          echo "gcc Version Check"
          gcc --version

          echo "QEMU Emulator Check"
          if [ "${{ matrix.arch }}" == "arm" ]; then
            qemu-system-arm --version || echo "qemu-system-arm not found"
          elif [ "${{ matrix.arch }}" == "aarch64" ]; then
            qemu-system-aarch64 --version || echo "qemu-system-aarch64 not found"
          elif [ "${{ matrix.arch }}" == "powerpc" ]; then
            qemu-system-ppc --version || echo "qemu-system-ppc not found"
          elif [ "${{ matrix.arch }}" == "x86_64" ]; then
            echo "Native x86_64 architecture: QEMU Emulator is not needed"
          else
            echo "Error: Unknown architecture '${{ matrix.arch }}' requested, exiting now..."
            exit 1
          fi

          echo "QEMU Cross-Compile Check"
          if [ "${{ matrix.arch }}" == "arm" ]; then
            arm-linux-gnueabihf-gcc --version || echo "arm-linux-gnueabihf-gcc not found"
          elif [ "${{ matrix.arch }}" == "aarch64" ]; then
            aarch64-linux-gnu-gcc --version || echo "aarch64-linux-gnu-gcc not found"
          elif [ "${{ matrix.arch }}" == "powerpc" ]; then
            powerpc-linux-gnu-gcc --version || echo "powerpc-linux-gnu-gcc not found"
          elif [ "${{ matrix.arch }}" == "x86_64" ]; then
            echo "Native x86_64 architecture: QEMU Cross-Compile is not needed, using gcc"
          else
            echo "Error: Unknown architecture '${{ matrix.arch }}' requested, exiting now..."
            exit 1
          fi

      - name: Compile Target
        run: |
          for project in $PROJECTS; do
            echo "---Compiling Project: $project"
            ./build.sh --target $project --arch ${{ matrix.arch }}
            # Rename for artifact
            mv "build/$project" "build/${project}-${{ matrix.arch }}"
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-binaries-${{ matrix.arch }}
          # Grabs all artifacts made with project_name-architecture
          path: build/*-${{ matrix.arch }}
          # Remove artifact files after a day, but latest builds will still be saved on release
          retention-days: 1



  # Job 3: Putting build files into release tab instead of temp storage artifacts
  release:
    needs: build
    runs-on: ubuntu-24.04
    # Publish artifacts to release if PR is approved
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true

    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-binaries
          pattern: project-binaries-*
          merge-multiple: true

      - name: Create Branch's Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-${{ github.base_ref }}
          name: Release for branch ${{ github.base_ref }}
          body: |
            Automated build for merge to main from PR...
            Source Branch: ${{ github.head_ref }}
            Target Branch: ${{ github.base_ref }}
            Merge Date: ${{ github.event.pull_request.merged_at }}

          files: ./all-binaries/*

          prerelease: ${{ github.base_ref != 'main' }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
