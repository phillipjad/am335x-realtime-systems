name: CI/CD Build For BeagleBone Black

on:
  push:
    branches: ["main", "12-create-cicd-pipeline-to-compile-and-lint-code"]
  pull_request:
    branches: ["main"]

jobs:
  # Job 1: Lint (clang formatting using v18.1.3)
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install clang-format v18.1.3
        run: pip install clang-format==18.1.3

      - name: Run Lint Check
        run: |
          echo "Checking code formatting..."
          find projects -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror --style=file

  # Job 2: QEMU Integration and Build
  build:
    needs: lint
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm, aarch64, powerpc]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential \
            qemu-system qemu-user-static qemu-utils \
            gdb-multiarch git

          # Install the architecture type we need for run
          if [ "${{ matrix.arch }}" == "arm" ]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf
          elif [ "${{ matrix.arch }}" == "aarch64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          elif [ "${{ matrix.arch }}" == "powerpc" ]; then
            sudo apt-get install -y gcc-powerpc-linux-gnu
          fi

      - name: Verify Toolchain Versions
        run: |
          echo "-- QEMU & Cross-Compile Check --"

          echo "gcc Version Check"
          gcc --version

          echo "QEMU Emulator Check"
          qemu-system-arm --version || echo "qemu-system-arm not found"
          qemu-system-aarch64 --version || echo "qemu-system-aarch64 not found"
          qemu-system-ppc --version || echo "qemu-system-ppc not found"

          echo "QEMU Cross-Compile Check"
          arm-linux-gnueabihf-gcc --version || echo "arm-linux-gnueabihf-gcc not found"
          aarch64-linux-gnu-gcc --version || echo "aarch64-linux-gnu-gcc not found"
          powerpc-linux-gnu-gcc --version || echo "powerpc-linux-gnu-gcc not found"

      - name: Compile Target
        run: |
          chmod +x build.sh
          # NEED TO CHANGE PER PROJECT
          ./build.sh --target p1 --arch ${{ matrix.arch }}

      - name: Test Target
        run: |
          # NEED TO CHANGE PER PROJECT
          if [ -f build/p1 ]; then
            # TODO remove this for real implementation, but timemout after 10 seconds so it does not keep running forever
            timeout --preserve-status 10s ./build/p1

            # Rename for artifact
            mv build/p1 build/p1-${{ matrix.arch }}
          else
            echo "Error: Build not found"
            exit 1
          fi
         
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: p1-binary-${{ matrix.arch }}
          path: build/p1-${{ matrix.arch }}
          # Remove artifact files after a day, but latest builds will still be saved on release
          retention-days: 1

  # Job 3: Putting build files into release tab instead of temp storage artifacts
  release:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-binaries
          # NEED TO CHANGE PER PROJECT
          pattern: p1-binary-*
          merge-multiple: true

      - name: Create Branch's Release
        uses: softprops/action-gh-release@v2
        with:
          # Use branch name as tag
          tag_name: latest-${{ github.ref_name }}
          name: Release for branch ${{ github.ref_name }}
          body: |
            Automated build for branch: ${{ github.ref_name }}
            Last Updated: ${{ github.event.head_commit.timestamp }}

          files: ./all-binaries/p1-*

          prerelease: ${{ github.ref_name != 'main' }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
